<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raphael Tattoo — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cubic: cubic-bezier(0.65, 0.05, 0, 1);
      --bg: #080808;
      --silver: #c0c0c0;
      --white: #f0f0f0;
      --warm: #d4a574;
      --grey: #666;
      --grey2: #444;
      --font-display: 'Playfair Display', serif;
      --font-body: 'Inter', -apple-system, sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    html { background: var(--bg); color: var(--white); font-family: var(--body); -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); overflow-x: hidden; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════
       NAV
    ═══════════════════════════════════════ */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.5rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-heading);
      font-size: clamp(0.65rem, 0.9vw, 0.8rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      font-weight: 600;
      overflow: hidden;
    }
    .nav-logo .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      animation: charReveal 0.6s var(--cubic) forwards;
    }
    @keyframes charReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    .nav-links { display: flex; gap: 2.5rem; align-items: center; }
    .nav-links a {
      font-family: var(--font-heading);
      font-size: clamp(0.55rem, 0.75vw, 0.65rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey);
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--white) !important;
      color: var(--bg) !important;
      padding: 0.55rem 1.2rem;
      border-radius: 3px;
      font-weight: 700 !important;
    }
    .nav-ham {
      width: 32px; height: 32px;
      border: 1px solid var(--grey2);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent;
      transition: border-color 0.3s;
    }
    .nav-ham:hover { border-color: var(--silver); }
    .nav-ham-lines { display: flex; flex-direction: column; gap: 4px; }
    .nav-ham-lines span { width: 14px; height: 1px; background: var(--silver); }

    /* ═══════════════════════════════════════
       HERO — Fullscreen image + text
    ═══════════════════════════════════════ */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg);
    }

    /* Background image — full bleed */
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('assets/images/hero-hands-machine.jpg') center/cover no-repeat;
      filter: grayscale(0.9) contrast(1.1) brightness(0.35);
      transform: scale(1.05);
      transition: transform 8s ease, filter 1s;
    }
    .hero:hover .hero-bg {
      transform: scale(1.0);
      filter: grayscale(0.7) contrast(1.15) brightness(0.4);
    }

    /* Vignette overlay */
    .hero-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(8,8,8,0.7) 100%);
      pointer-events: none;
    }

    /* Bottom gradient */
    .hero-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════
       HERO NAME — centered, massive, animated
    ═══════════════════════════════════════ */
    .hero-name {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 2rem;
    }
    .hero-name-line {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 9rem);
      line-height: 0.95;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      overflow: hidden;
    }
    .hero-name-line span {
      display: inline-block;
      opacity: 0;
      transform: translateY(110%);
    }
    .hero-name-line:nth-child(1) span { animation: nameReveal 1s var(--cubic) 0.3s forwards; }
    .hero-name-line:nth-child(2) span { animation: nameReveal 1s var(--cubic) 0.5s forwards; }

    @keyframes nameReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Silver accent on second line */
    .hero-name-accent { color: var(--silver); }

    /* Tagline */
    .hero-tagline {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 1.5rem;
    }
    .hero-tagline p {
      font-family: var(--font-heading);
      font-size: clamp(0.5rem, 0.7vw, 0.6rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey2);
      opacity: 0;
      animation: fadeIn 1s 0.8s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ═══════════════════════════════════════
       HERO BOTTOM — stats + scroll
    ═══════════════════════════════════════ */
    .hero-bottom {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 10;
    }
    .hero-stats {
      display: flex;
      gap: 2.5rem;
    }
    .hero-stat {
      opacity: 0;
      animation: fadeIn 1s 1s forwards;
    }
    .hero-stat:nth-child(2) { animation-delay: 1.1s; }
    .hero-stat:nth-child(3) { animation-delay: 1.2s; }
    .hero-stat-num {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }
    .hero-stat-label {
      font-family: var(--font-heading);
      font-size: clamp(0.38rem, 0.5vw, 0.45rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey2);
      margin-top: 0.2rem;
    }

    .hero-scroll {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
    }
    .hero-scroll span {
      font-family: var(--font-heading);
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grey2);
    }
    .scroll-line {
      width: 1px; height: 30px;
      background: linear-gradient(to bottom, var(--silver), transparent);
      animation: scrollPulse 2s infinite;
    }
    @keyframes scrollPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ═══════════════════════════════════════
       CUSTOM CURSOR
    ═══════════════════════════════════════ */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--silver);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transition: transform 0.1s ease-out;
    }
    .cursor.active { transform: scale(4); background: var(--warm); }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 768px) {
      .nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hero-bottom { flex-direction: column; align-items: center; gap: 1.5rem; padding: 1.5rem; }
      .hero-stats { gap: 1.5rem; }
      .cursor { display: none; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-logo" id="navLogo"></div>
    <div class="nav-links">
      <a href="#">Portfólio</a>
      <a href="#">Sobre</a>
      <a href="#">Especialidades</a>
      <a href="#" class="nav-cta">Agendar</a>
    </div>
    <div class="nav-ham">
      <div class="nav-ham-lines"><span></span><span></span></div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-vignette"></div>
    <div class="hero-gradient"></div>

    <!-- Name — centered -->
    <div class="hero-name">
      <div class="hero-name-line"><span>Raphael</span></div>
      <div class="hero-name-line"><span class="hero-name-accent">Tattoo</span></div>
    </div>
    <div class="hero-tagline">
      <p>Black &amp; Gray · Realismo · Portrait</p>
    </div>

    <!-- Bottom -->
    <div class="hero-bottom">
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-num">8.7K+</div>
          <div class="hero-stat-label">Seguidores</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num">3x</div>
          <div class="hero-stat-label">Premiado</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num">4</div>
          <div class="hero-stat-label">Especialidades</div>
        </div>
      </div>
      <div class="hero-scroll">
        <span>Scroll</span>
        <div class="scroll-line"></div>
      </div>
    </div>
  </section>

  <script>
    // NAV LOGO — char stagger
    const logoText = 'RAPHAEL TATTOO';
    const logoEl = document.getElementById('navLogo');
    logoText.split('').forEach((char, i) => {
      const s = document.createElement('span');
      s.className = 'char';
      s.textContent = char === ' ' ? '\u00A0' : char;
      s.style.animationDelay = (0.1 + i * 0.03) + 's';
      logoEl.appendChild(s);
    });

    // CUSTOM CURSOR
    const cursor = document.getElementById('cursor');
    let cx = 0, cy = 0, px = 0, py = 0;
    document.addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });
    (function loop() {
      px += (cx - px) * 0.15;
      py += (cy - py) * 0.15;
      cursor.style.left = px - 4 + 'px';
      cursor.style.top = py - 4 + 'px';
      requestAnimationFrame(loop);
    })();
    document.querySelectorAll('a, button, .nav-ham').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('active'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
    });
  </script>
</body>
</html>
